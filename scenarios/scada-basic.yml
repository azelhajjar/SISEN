scenario:
  name: scada-basic
  type: scada
  description: Basic SCADA wireless simulation with HMI, SCADA server, PLCs, RTUs and sensors

ap:
  mode: open
  interface: wlan0
  ssid: SCADA-LAB
  channel: 6

devices:
  hmi: 1
  scada_server: 1
  plc: 2
  rtu: 2
  sensors: 4

traffic:
  protocol: modbus_tcp
  intensity: medium

security:
  weak_device_authentication: false
  default_credentials_enabled: false

failures:
  random_device_dropoff: false

anomalies:
  enabled: false
  out_of_range_values: false
  unexpected_commands: false

sensor_data:
  temperature:
    min: 65.0
    max: 75.0
    unit: celsius
  pressure:
    min: 2.1
    max: 2.5
    unit: bar
  flow_rate:
    min: 10.0
    max: 15.0
    unit: litres_per_minute
